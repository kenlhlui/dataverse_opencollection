info:
    name: Replace a file on a dataset
    type: http
    seq: 2
    tags:
        - replaceFilesInDataset
http:
    method: POST
    url: '{{baseUrl}}/files/:id/replace'
    params:
        - name: id
          value: '{{id}}'
          type: path
    headers:
        - name: Content-Type
          value: multipart/form-data
    body:
        type: multipart-form
    auth: inherit
docs: Replace a file to a dataset
