info:
    name: Files Get External Tool Fmparams
    type: http
    seq: 411
http:
    method: GET
    url: '{{baseUrl}}/files/:id/metadata/:fmid/toolparams/:tid'
    params:
        - name: fmid
          value: '{{fmid}}'
          type: path
        - name: id
          value: '{{id}}'
          type: path
        - name: tid
          value: '{{tid}}'
          type: path
        - name: locale
          value: ""
          type: query
    auth: inherit
