info:
    name: Builtin Users Create
    type: http
    seq: 201
http:
    method: POST
    url: '{{baseUrl}}/builtin-users/:password/:key'
    params:
        - name: key
          value: '{{key}}'
          type: path
        - name: password
          value: '{{password}}'
          type: path
    auth: inherit
