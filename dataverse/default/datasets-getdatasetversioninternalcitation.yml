info:
    name: Datasets Get Dataset Version Internal Citation
    type: http
    seq: 312
http:
    method: GET
    url: '{{baseUrl}}/datasets/:id/versions/:versionId/citation'
    params:
        - name: id
          value: '{{id}}'
          type: path
        - name: versionId
          value: '{{versionId}}'
          type: path
        - name: includeDeaccessioned
          value: "false"
          type: query
    auth: inherit
