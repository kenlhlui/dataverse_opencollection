info:
    name: Access Datafile Bundle
    type: http
    seq: 1
http:
    method: GET
    url: '{{baseUrl}}/access/datafile/bundle/:fileId'
    params:
        - name: fileId
          value: '{{fileId}}'
          type: path
        - name: fileMetadataId
          value: "0"
          type: query
        - name: gbrecs
          value: "false"
          type: query
    headers:
        - name: Accept
          value: application/zip
    auth: inherit
