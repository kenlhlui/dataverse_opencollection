info:
    name: Metrics Get Make Data Count Metric To Month
    type: http
    seq: 468
http:
    method: GET
    url: '{{baseUrl}}/info/metrics/makeDataCount/:metric/toMonth/:yyyymm'
    params:
        - name: metric
          value: '{{metric}}'
          type: path
        - name: yyyymm
          value: '{{yyyymm}}'
          type: path
        - name: country
          value: ""
          type: query
        - name: parentAlias
          value: ""
          type: query
    auth: inherit
