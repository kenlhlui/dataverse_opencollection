info:
    name: Datasets Get Make Data Count Metric Current Month
    type: http
    seq: 280
http:
    method: GET
    url: '{{baseUrl}}/datasets/:id/makeDataCount/:metric'
    params:
        - name: id
          value: '{{id}}'
          type: path
        - name: metric
          value: '{{metric}}'
          type: path
        - name: country
          value: ""
          type: query
    auth: inherit
