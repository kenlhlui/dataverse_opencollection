info:
    name: Datasets Get Dataset Version Citation
    type: http
    seq: 313
http:
    method: GET
    url: '{{baseUrl}}/datasets/:id/versions/:versionId/citation/:format'
    params:
        - name: format
          value: '{{format}}'
          type: path
        - name: id
          value: '{{id}}'
          type: path
        - name: versionId
          value: '{{versionId}}'
          type: path
        - name: includeDeaccessioned
          value: "false"
          type: query
    auth: inherit
