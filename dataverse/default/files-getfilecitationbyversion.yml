info:
    name: Files Get File Citation By Version
    type: http
    seq: 423
http:
    method: GET
    url: '{{baseUrl}}/files/:id/versions/:dsVersionString/citation'
    params:
        - name: dsVersionString
          value: '{{dsVersionString}}'
          type: path
        - name: id
          value: '{{id}}'
          type: path
        - name: includeDeaccessioned
          value: "false"
          type: query
    auth: inherit
