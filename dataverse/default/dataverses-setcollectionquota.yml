info:
    name: Dataverses Set Collection Quota
    type: http
    seq: 383
http:
    method: POST
    url: '{{baseUrl}}/dataverses/:identifier/storage/quota/:bytesAllocated'
    params:
        - name: bytesAllocated
          value: '{{bytesAllocated}}'
          type: path
        - name: identifier
          value: '{{identifier}}'
          type: path
    auth: inherit
