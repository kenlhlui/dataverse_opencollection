info:
    name: Dataverses Move Dataverse
    type: http
    seq: 390
http:
    method: POST
    url: '{{baseUrl}}/dataverses/:id/move/:targetDataverseAlias'
    params:
        - name: id
          value: '{{id}}'
          type: path
        - name: targetDataverseAlias
          value: '{{targetDataverseAlias}}'
          type: path
        - name: forceMove
          value: "false"
          type: query
    auth: inherit
