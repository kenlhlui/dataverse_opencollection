info:
    name: Access Delete Auxiliary File With Version
    type: http
    seq: 5
http:
    method: DELETE
    url: '{{baseUrl}}/access/datafile/:fileId/auxiliary/:formatTag/:formatVersion'
    params:
        - name: fileId
          value: '{{fileId}}'
          type: path
        - name: formatTag
          value: '{{formatTag}}'
          type: path
        - name: formatVersion
          value: '{{formatVersion}}'
          type: path
    auth: inherit
