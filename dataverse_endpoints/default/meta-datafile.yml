info:
    name: Meta Datafile
    type: http
    seq: 490
http:
    method: GET
    url: '{{baseUrl}}/meta/datafile/:fileId'
    params:
        - name: fileId
          value: '{{fileId}}'
          type: path
        - name: exclude
          value: ""
          type: query
        - name: fileMetadataId
          value: "0"
          type: query
        - name: include
          value: ""
          type: query
    headers:
        - name: Accept
          value: text/xml
    auth: inherit
