info:
    name: Access Tabular Datafile Metadata
    type: http
    seq: 7
http:
    method: GET
    url: '{{baseUrl}}/access/datafile/:fileId/metadata'
    params:
        - name: fileId
          value: '{{fileId}}'
          type: path
        - name: exclude
          value: ""
          type: query
        - name: fileMetadataId
          value: "0"
          type: query
        - name: include
          value: ""
          type: query
    headers:
        - name: Accept
          value: text/xml
    auth: inherit
