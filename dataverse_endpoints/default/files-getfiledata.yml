info:
    name: Files Get File Data
    type: http
    seq: 399
http:
    method: GET
    url: '{{baseUrl}}/files/:id'
    params:
        - name: id
          value: '{{id}}'
          type: path
        - name: includeDeaccessioned
          value: "false"
          type: query
        - name: returnDatasetVersion
          value: "false"
          type: query
        - name: returnOwners
          value: "false"
          type: query
    auth: inherit
