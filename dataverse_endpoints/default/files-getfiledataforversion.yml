info:
    name: Files Get File Data For Version
    type: http
    seq: 422
http:
    method: GET
    url: '{{baseUrl}}/files/:id/versions/:datasetVersionId'
    params:
        - name: datasetVersionId
          value: '{{datasetVersionId}}'
          type: path
        - name: id
          value: '{{id}}'
          type: path
        - name: includeDeaccessioned
          value: "false"
          type: query
        - name: returnDatasetVersion
          value: "false"
          type: query
        - name: returnOwners
          value: "false"
          type: query
    auth: inherit
