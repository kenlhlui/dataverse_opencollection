info:
    name: Access List Datafile Metadata Aux By Origin
    type: http
    seq: 6
http:
    method: GET
    url: '{{baseUrl}}/access/datafile/:fileId/auxiliary/:origin'
    params:
        - name: fileId
          value: '{{fileId}}'
          type: path
        - name: origin
          value: '{{origin}}'
          type: path
    auth: inherit
