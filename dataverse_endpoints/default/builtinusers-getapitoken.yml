info:
    name: Builtin Users Get Api Token
    type: http
    seq: 203
http:
    method: GET
    url: '{{baseUrl}}/builtin-users/:username/api-token'
    params:
        - name: username
          value: '{{username}}'
          type: path
        - name: password
          value: ""
          type: query
    auth: inherit
