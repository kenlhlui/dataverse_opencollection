info:
    name: Datasets Get Compare Versions
    type: http
    seq: 307
http:
    method: GET
    url: '{{baseUrl}}/datasets/:id/versions/:versionId1/compare/:versionId2'
    params:
        - name: id
          value: '{{id}}'
          type: path
        - name: versionId1
          value: '{{versionId1}}'
          type: path
        - name: versionId2
          value: '{{versionId2}}'
          type: path
        - name: includeDeaccessioned
          value: "false"
          type: query
    auth: inherit
