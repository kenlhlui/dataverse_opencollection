info:
    name: Datasets Get Version
    type: http
    seq: 308
http:
    method: GET
    url: '{{baseUrl}}/datasets/:id/versions/:versionId'
    params:
        - name: id
          value: '{{id}}'
          type: path
        - name: versionId
          value: '{{versionId}}'
          type: path
        - name: excludeFiles
          value: "false"
          type: query
        - name: excludeMetadataBlocks
          value: "false"
          type: query
        - name: includeDeaccessioned
          value: "false"
          type: query
        - name: returnOwners
          value: "false"
          type: query
    auth: inherit
