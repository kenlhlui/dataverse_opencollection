info:
    name: Save auxiliary file with version
    type: http
    seq: 1
    tags:
        - saveAuxiliaryFileWithVersion
http:
    method: POST
    url: '{{baseUrl}}/access/datafile/:fileId/auxiliary/:formatTag/:formatVersion'
    params:
        - name: fileId
          value: '{{fileId}}'
          type: path
        - name: formatTag
          value: '{{formatTag}}'
          type: path
        - name: formatVersion
          value: '{{formatVersion}}'
          type: path
    headers:
        - name: Content-Type
          value: multipart/form-data
    body:
        type: multipart-form
    auth: inherit
docs: Saves an auxiliary file
