info:
    name: Uploads a file for a dataset
    type: http
    seq: 1
    tags:
        - addFileToDataset
http:
    method: POST
    url: '{{baseUrl}}/datasets/:id/add'
    params:
        - name: id
          value: '{{id}}'
          type: path
    headers:
        - name: Content-Type
          value: multipart/form-data
    body:
        type: multipart-form
    auth: inherit
docs: Uploads a file for a dataset
