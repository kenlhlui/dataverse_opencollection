info:
    name: Uploads a set of files to a dataset
    type: http
    seq: 1
    tags:
        - addFilesToDataset
http:
    method: POST
    url: '{{baseUrl}}/datasets/:id/addFiles'
    params:
        - name: id
          value: '{{id}}'
          type: path
    headers:
        - name: Content-Type
          value: multipart/form-data
    body:
        type: multipart-form
    auth: inherit
docs: Uploads a set of files to a dataset
