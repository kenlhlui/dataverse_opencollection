opencollection: 1.0.0
info:
    name: Dataverse API
    summary: Open source research data repository software.
    version: v6.8.1-SP
request:
    auth:
        type: apikey
        key: X-Dataverse-Key
        value: '{{API_TOKEN}}'
        placement: header
extensions:
    bruno:
        ignore:
            - node_modules
            - .git
