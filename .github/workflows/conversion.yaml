name: Conversion Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert-openapi-to-bruno:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
         
    - name: Read the baseUrl from dv.txt
      id: read_base_url
      run: echo "BASE_URL=$(cat dv.txt)" >> $GITHUB_ENV
    
    - name: Get the Latest openapi spec from the Dataverse installation
      env:
        OPENAPI_URL: ${{ env.BASE_URL }}/openapi
      run: curl -L  ${{ env.OPENAPI_URL }} -o config.yaml

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install the vacuum CLI
      run: npm i -g @quobix/vacuum
    
    - name: Convert OpenAPI spec to Openapi collection
      env:
        NODE_OPTIONS: --max-old-space-size=7168
      run: vacuum open-collection config.yaml ./dataverse_endpoints/ --name "Dataverse API" -q
    
    - name: Commit and push openapi collection
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: Update Openapi collection from OpenAPI spec [ci]
        file_pattern: '. :!dataverse_endpoints/environments/default.yml'